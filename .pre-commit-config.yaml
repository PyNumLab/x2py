minimum_pre_commit_version: "4.0.0"

exclude: |
  (?x)^(
    tests/data/|
    tests/pyi/fixtures/|
    x2py\.egg-info/
  )

repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        files: \.pyi?$

      - id: ruff-check
        name: ruff check
        entry: ruff check --fix
        language: system
        files: \.pyi?$

      - id: bandit
        name: bandit security scan
        entry: bandit -c pyproject.toml -r c_parser fortran_parser semantics x2py --severity-level medium --confidence-level medium
        language: system
        pass_filenames: false
        files: \.py$

      - id: radon-policy
        name: radon complexity policy
        entry: python3 tools/check_radon_policy.py
        language: system
        pass_filenames: false
        files: \.py$

      - id: vulture
        name: vulture dead-code scan
        entry: vulture
        language: system
        pass_filenames: false
        stages: [manual]

      - id: radon-complexity
        name: radon complexity report
        entry: radon cc c_parser fortran_parser semantics x2py -n C -s --total-average
        language: system
        pass_filenames: false
        stages: [manual]
