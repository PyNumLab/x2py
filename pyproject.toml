[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "minimal-fortran-parser"
version = "0.1.0"
description = "Minimal Fortran signature parser for wrapper generation"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "colorama>=0.4.6; platform_system == 'Windows'",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["fortran_parser*"]

[project.scripts]
fortran-parser = "fortran_parser.cli:main"
