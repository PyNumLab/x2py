site_name: x2py
site_url: https://pynumlab.github.io/x2py/
repo_url: https://github.com/PyNumLab/x2py
repo_name: PyNumLab/x2py
docs_dir: docs
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
plugins:
  - search
hooks:
  - tools/mkdocs_publication.py
markdown_extensions:
  - admonition
  - toc:
      permalink: true
exclude_docs: |
  old_docs/**
nav:
  - Home: index.md
  - User Documentation:
      - Overview: user/index.md
      - Getting Started:
