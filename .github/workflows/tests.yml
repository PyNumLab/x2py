name: Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - release/*

jobs:
  wait-for-static-analysis:
    name: Wait for Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      checks: read
    steps:
      - name: Wait for the Quality workflow
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          for attempt in {1..120}; do
            check=$(
              gh api "repos/${GITHUB_REPOSITORY}/commits/${TARGET_SHA}/check-runs?per_page=100" \
                --jq '[.check_runs[] | select(.name == "Static Analysis")] | sort_by(.id) | last | select(. != null) | [.status, (.conclusion // "")] | @tsv'
            )

            if [ -z "$check" ]; then
              echo "Waiting for Static Analysis to start (${attempt}/120)"
              sleep 15
              continue
            fi

            IFS=$'\t' read -r status conclusion <<< "$check"
            echo "Static Analysis status: ${status}${conclusion:+ (${conclusion})}"

            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                exit 0
              fi

              echo "Static Analysis did not pass."
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for Static Analysis."
          exit 1

  test:
    needs: wait-for-static-analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[qa]"
      - name: Run tests
        env:
          PYTHONPATH: .
          COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
          HYPOTHESIS_PROFILE: ci
        run: python -m coverage run -m pytest -q --randomly-seed=1
      - name: Combine coverage data
        run: python -m coverage combine
      - name: Report coverage
        run: python -m coverage report
      - name: Emit coverage XML
        run: python -m coverage xml -o coverage.xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: py312
          use_oidc: true
          fail_ci_if_error: true
